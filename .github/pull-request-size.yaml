# Configuration for PR Size Labeler
# Excludes lockfiles and Avalonia compiled-binding generated noise from the count.

exclude_files:
  - 'packages.lock.json'
  - '**/packages.lock.json'
  - '**/*.designer.cs'
  - 'questions.json'

label_configs:
  - size: xs
    diff: 25
    files: 1
    labels: ['size/xs']

  - size: s
    diff: 150
    files: 10
    labels: ['size/s']

  - size: m
    diff: 600
    files: 25
    labels: ['size/m', 'status/review-needed']

  - size: l
    diff: 2500
    files: 50
    labels: ['size/l', 'status/review-needed']

  - size: xl
    diff: 5000
    files: 100
    labels: ['size/xl', 'status/review-needed']
