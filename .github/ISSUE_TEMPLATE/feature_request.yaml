name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["type/feat", "status/triage"]
assignees:
  - Synertry
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please confirm the feature isn't on the README's "Out of scope" list (auth, telemetry, auto-update, i18n, non-Windows targets) before filing.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. Concrete scenarios beat abstract requests.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the feature look like from the user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or how you work around the problem today.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, related issues, examples from other tools.
