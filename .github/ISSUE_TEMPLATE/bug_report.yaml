name: Bug Report
description: File a bug report with reproducible steps.
title: "[Bug]: "
labels: ["type/fix", "status/triage"]
assignees:
  - Synertry
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below; the more concrete the repro, the faster the fix.

  - type: input
    id: version
    attributes:
      label: OpenTDBLookup version
      description: Visible in the app's window footer (`v0.x.y`) or via `OpenTDBLookup.exe --version`. For pre-release builds, paste the `git rev-parse --short HEAD` you built from.
      placeholder: "v0.0.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      description: Run `winver` and paste the build line (e.g. "Windows 11 Pro 24H2 (Build 26200.1234)").
      placeholder: "Windows 11 Pro 24H2"
    validations:
      required: true

  - type: dropdown
    id: build_type
    attributes:
      label: Which build are you running?
      options:
        - Slim (framework-dependent, requires .NET 10)
        - Self-contained (bundled runtime)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen, and what actually happened?
      placeholder: "Pasted a known question; the app shows 'No match found' instead of the answer..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Open the app.
        2. Paste "What is the capital of France?".
        3. Observe: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the relevant section of `logs/opentdb-YYYY-MM-DD.log`. Redact any personal data first.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, related issues, ideas about the cause, etc.
