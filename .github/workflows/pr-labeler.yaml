name: PR Labeler

on:
  pull_request:
    branches:
      - release
      - main
  # Note: pull_request_target was deliberately removed. It runs with elevated
  # permissions and would race with the pull_request trigger on every main PR
  # (two labeler runs with sync-labels:true thrash each other). Fork-PR labeling
  # is not a concern for this repo today.

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    name: Triage PR
    runs-on: ubuntu-latest
    steps:
      # Dependabot applies its labels (area/deps or area/CI, type/chore,
      # workflow/dependabot, workflow/auto-pr) via the labels: list in
      # dependabot.yaml, so skip only this file-based labeler step for bot PRs
      # to stop sync-labels stripping them. The size-labeler job below is
      # independent and still runs on every PR.
      - uses: actions/labeler@v6.1.0
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labels.yaml
          sync-labels: true

  size-labeler:
    name: Label the PR size
    runs-on: ubuntu-latest
    needs: triage
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
      - name: Label PR based on size
        uses: cbrgm/pr-size-labeler-action@v1.3.9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          github_pr_number: ${{ github.event.number }}
          config_file_path: '.github/pull-request-size.yaml'
          github_enterprise_url: ''
