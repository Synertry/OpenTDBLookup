# GitHub's built-in "delete head branch on merge" lacks a protect-list, so a
# misconfigured PR can delete main/release. This handles it safely.
name: Delete Merged Branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    name: Delete merged PR branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Delete Branch Safely
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          PROTECTED_BRANCHES=("main" "release")

          if [[ " ${PROTECTED_BRANCHES[*]} " =~ " ${HEAD_REF} " ]]; then
            echo "Protected branch '${HEAD_REF}' detected. Skipping deletion."
            exit 0
          fi

          echo "Deleting merged branch '${HEAD_REF}'..."
          # Tolerate a branch that is already gone, but fail on any other error
          # so a real API/auth/rate-limit failure is not reported as success.
          if gh api -X DELETE "repos/${REPO}/git/refs/heads/${HEAD_REF}"; then
            echo "Branch deleted."
          elif ! gh api "repos/${REPO}/git/refs/heads/${HEAD_REF}" >/dev/null 2>&1; then
            echo "Branch already absent; nothing to delete."
          else
            echo "Branch deletion failed and the branch still exists." >&2
            exit 1
          fi
