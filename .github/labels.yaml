# Config Files
'area/config':
  - changed-files:
      - any-glob-to-any-file:
          - '.gitignore'
          - '.editorconfig'
          - '.gitattributes'
          - '.env.example'
          - 'Directory.Build.props'

# IDEs and editors
'area/IDE':
  - changed-files:
      - any-glob-to-any-file:
          - '.vscode/**/*'
          - '.idea/**/*'
          - '.vs/**/*'

# GitHub Workflows and meta
'area/CI':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/CODEOWNERS'
          - '.github/workflows/**/*.yaml'
          - '.github/workflows/**/*.yml'
          - '.github/api/**'
          - '.github/dependabot.yaml'
          - '.github/labels.yaml'
          - '.github/pull-request-size.yaml'

# NuGet dependencies
'area/deps':
  - changed-files:
      - any-glob-to-any-file:
          - '**/packages.lock.json'
          - '**/*.csproj'
          - 'Directory.Packages.props'

# Source code (C# excluding tests)
'area/source':
  - changed-files:
      - all-globs-to-any-file:
          - '**/*.cs'
          - '!**/*Tests*.cs'
          - '!**/*.Tests/**/*'

# XAML / UI markup
'area/ui':
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.axaml'
          - '**/*.axaml.cs'
          - '**/*.xaml'

# Tests. Dependency-only bumps to the test project stay in area/deps.
'area/tests':
  - changed-files:
      - all-globs-to-any-file:
          - '**/*.Tests/**/*'
          - '!**/*.csproj'
          - '!**/packages.lock.json'

# Build / signing scripts
'area/scripts':
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/**/*'

# Documentation
'area/docs':
  - changed-files:
      - any-glob-to-any-file:
          - '**/README.md'
          - '**/CONTRIBUTING.md'
          - '**/CODE_OF_CONDUCT.md'
          - '**/SECURITY.md'
          - '.github/copilot-instructions.md'

# License
'area/license':
  - changed-files:
      - any-glob-to-any-file:
          - 'LICENSE'


# Labels based on commit messages / branch prefixes

'type/build': # Changes that affect the build system or external dependencies
  - head-branch: '^build'

'type/chore': # Maintenance tasks that don't modify source or test files
  - head-branch: '^chore'

'type/ci': # Changes to CI configuration files and scripts
  - head-branch: '^ci'

'type/docs': # Documentation-only changes
  - head-branch: '^docs'

'type/feat': # A new feature
  - head-branch: '^feat'

'type/fix': # A bug fix
  - head-branch: '^fix'

'type/perf': # A code change that improves performance
  - head-branch: '^perf'

'type/refactor': # A code change that neither fixes a bug nor adds a feature
  - head-branch: '^refactor'

'type/revert': # Reverts a previous commit
  - head-branch: '^revert'

'type/style': # Whitespace and formatting changes that do not alter semantics
  - head-branch: '^style'

'type/test': # Adding missing tests or correcting existing tests
  - head-branch: '^test'
